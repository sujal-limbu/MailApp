<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Email Sender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src='https://kit.fontawesome.com/a076d05399.js' crossorigin='anonymous'></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: aliceblue;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        .alert {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }

        .container{
            max-width: 600px;
            /* ← limits width to 600px */
            margin: 50px auto;
            /* ← auto centers it */
            padding: 20px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg bg-info">
        <div class="container-fluid">
            <a class="navbar-brand mx-auto text-white "style="font-family: 'Times New Roman', Times, serif;" href="#"> Mail App <i class='fas fa-comment'
                    style='font-size:20px;color:yellow'></i></a>
        </div>
    </nav>

   

    {% for message in messages %}
    <div class="alert {{ message.tags }}" id="pop-message">
        {{ message }}
    </div>
    {% endfor %}

    <div class="container mt-4 border border-dark p-4 rounded shadow">
         <h4>Send Email</h4>
         <br>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }} <!-- Renders all fields wrapped in <p> tags -->
            <button type="submit">Send Email</button>
        </form>

    </div>



    <script>
        const msg = document.getElementById('pop-message');
        if (msg) {
            setTimeout(() => {
                msg.style.transition = 'opacity 1s ease';
                msg.style.opacity = '0';
                setTimeout(() => msg.remove(), 1000);
            }, 3000);  // disappears after 3 seconds
        }
    </script>
</body>

</html>
